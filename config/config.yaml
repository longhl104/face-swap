# Face Swap System Configuration

# Image dimensions (faces are resized to square crops)
image_size: 32

# Training hyperparameters
training:
  batch_size: 8
  epochs: 50
  learning_rate: 0.0002
  identity_weight: 10.0     # primary objective — preserve source identity
  reconstruction_weight: 2.0
  adversarial_weight: 0.1   # PatchGAN discriminator
  grad_clip: 1.0             # prevent NaN from gradient explosion
  val_split: 0.1
  checkpoint_every: 5
  identity_every: 1           # e.g. 4 to compute FaceNet loss every 4 steps
  adversarial_every: 1        # e.g. 2 to train discriminator every 2 steps

# Inference settings (neural generator only)
inference:
  blend_ratio: 0.85
  feather_kernel: 15
  mask_scale: 1      # <1 shrinks parsing mask slightly

# Video processing (bonus)
video:
  temporal_alpha: 0.7
  max_fps: 30

# Storage paths (relative to project root)
paths:
  raw_data: data/raw
  processed_data: data/processed
  uploads: data/uploads
  model_weights: models/weights
  training_output: outputs/training
  inference_output: outputs/inference
