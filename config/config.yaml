# Face Swap System Configuration

# Image dimensions (faces are resized to square crops)
image_size: 128

# Training hyperparameters
training:
  batch_size: 8           # smaller batch is faster per-step on CPU
  epochs: 50
  learning_rate: 0.0002
  latent_dim: 512          # FaceNet embedding size (fixed)
  facenet_pretrained: vggface2
  identity_weight: 10.0
  reconstruction_weight: 2.0
  val_split: 0.1
  num_workers: 0           # use 0 on Windows to avoid DataLoader hangs
  checkpoint_every: 5

# Inference settings
inference:
  mode: neural        # classical | neural | hybrid
  blend_ratio: 0.85
  feather_kernel: 21
  neural_blend: 0.15     # only used in hybrid mode

# Video processing (bonus)
video:
  temporal_alpha: 0.7        # EMA smoothing factor (higher = smoother)
  max_fps: 30

# Storage paths (relative to project root)
paths:
  raw_data: data/raw
  processed_data: data/processed
  uploads: data/uploads
  model_weights: models/weights
  training_output: outputs/training
  inference_output: outputs/inference
