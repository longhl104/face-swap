# Face Swap System Configuration

# Image dimensions (faces are resized to square crops)
image_size: 256

# Training hyperparameters
training:
  batch_size: 8
  epochs: 50
  learning_rate: 0.0002
  latent_dim: 512          # FaceNet embedding size (fixed)
  facenet_pretrained: vggface2
  identity_weight: 10.0     # primary objective — preserve source identity
  reconstruction_weight: 2.0
  chroma_weight: 4.0        # Lab a/b match — target skin tone, not luminance
  perceptual_weight: 1.0    # VGG perceptual loss for visual realism
  adversarial_weight: 0.1   # PatchGAN discriminator
  grad_clip: 1.0             # prevent NaN from gradient explosion
  use_gan: true
  val_split: 0.1
  num_workers: 0
  checkpoint_every: 5
  # Optional speed knobs (set temporarily, then remove/zero for full training)
  max_train_samples: 0        # e.g. 800 or 2000
  max_val_samples: 0          # e.g. 100 or 200
  identity_every: 1           # e.g. 4 to compute FaceNet loss every 4 steps
  perceptual_every: 1        # e.g. 2 to compute VGG loss every 2 steps
  adversarial_every: 1        # e.g. 2 to train discriminator every 2 steps

# Inference settings (neural generator only)
inference:
  blend_ratio: 0.95
  feather_kernel: 21
  face_padding: 0.12   # crop margin around detected face bbox
  mask_scale: 1     # <1 shrinks parsing mask slightly

# Video processing (bonus)
video:
  temporal_alpha: 0.7
  max_fps: 30

# Storage paths (relative to project root)
paths:
  raw_data: data/raw
  processed_data: data/processed
  uploads: data/uploads
  model_weights: models/weights
  training_output: outputs/training
  inference_output: outputs/inference
